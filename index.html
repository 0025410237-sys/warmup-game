<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Sắp Xếp Câu Tiếng Anh</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --background-color: #f5f7fa;
            --card-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .progress-bar {
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .hint {
            font-style: italic;
            color: #555;
            margin-bottom: 25px;
            background: #edf2f7;
            padding: 10px;
            border-radius: 8px;
        }

        .word-pool, .answer-zone {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            min-height: 60px;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .word-pool {
            background-color: #e2e8f0;
            border: 2px dashed #cbd5e0;
        }

        .answer-zone {
            background-color: #edf2f7;
            border: 2px solid #cbd5e0;
        }

        .word-card {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }

        .word-card:active {
            transform: scale(0.95);
        }

        .word-card.selected {
            background-color: #a0aec0;
        }

        button {
            background-color: #2d3748;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #4a5568;
        }

        .result-message {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .success { color: var(--success-color); }
        .error { color: var(--error-color); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>Word Scramble Game</h1>
    <div id="game-screen">
        <div class="progress-bar" id="progress">Câu hỏi 1 / 5</div>
        <div class="hint" id="hint">Gợi ý dịch nghĩa sẽ ở đây</div>
        
        <p style="text-align: left; margin-bottom: 5px; font-weight: bold; color: #4a5568;">Từ gợi ý (Bấm để chọn):</p>
        <div class="word-pool" id="word-pool"></div>
        
        <p style="text-align: left; margin-bottom: 5px; font-weight: bold; color: #4a5568;">Câu trả lời của bạn (Bấm để hủy chọn):</p>
        <div class="answer-zone" id="answer-zone"></div>
        
        <button id="action-btn" onclick="checkAnswer()">Kiểm Tra</button>
        <div class="result-message" id="result-msg"></div>
    </div>

    <div id="end-screen" class="hidden">
        <h2>Chúc mừng bạn đã hoàn thành!</h2>
        <p id="final-score" style="font-size: 20px; margin: 20px 0;"></p>
        <button onclick="restartGame()">Chơi Lại</button>
    </div>
</div>

<script>
    // Danh sách 5 câu hỏi mức độ A2-B1
    const questions = [
        {
            correct: "If it rains tomorrow, we will cancel the picnic.",
            hint: "Nếu ngày mai trời mưa, chúng tôi sẽ hủy chuyến dã ngoại. (Câu ĐK loại 1)",
            words: ["If", "it", "rains", "tomorrow,", "we", "will", "cancel", "the", "picnic."]
        },
        {
            correct: "She has been learning English for three years.",
            hint: "Cô ấy đã học tiếng Anh được 3 năm rồi. (Thì Hiện tại hoàn thành tiếp diễn)",
            words: ["She", "has", "been", "learning", "English", "for", "three", "years."]
        },
        {
            correct: "This is the most beautiful place I have ever visited.",
            hint: "Đây là nơi đẹp nhất mà tôi từng ghé thăm. (So sánh nhất + Hiện tại hoàn thành)",
            words: ["This", "is", "the", "most", "beautiful", "place", "I", "have", "ever", "visited."]
        },
        {
            correct: "Although he was tired, he finished his homework.",
            hint: "Mặc dù mệt, anh ấy vẫn làm xong bài tập về nhà. (Cấu trúc Although)",
            words: ["Although", "he", "was", "tired,", "he", "finished", "his", "homework."]
        },
        {
            correct: "You should avoid spending too much time on social media.",
            hint: "Bạn nên tránh dành quá nhiều thời gian trên mạng xã hội. (Cấu trúc Avoid + V-ing)",
            words: ["You", "should", "avoid", "spending", "too", "much", "time", "on", "social", "media."]
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;
    let isChecked = false;

    const progressEl = document.getElementById('progress');
    const hintEl = document.getElementById('hint');
    const wordPoolEl = document.getElementById('word-pool');
    const answerZoneEl = document.getElementById('answer-zone');
    const actionBtn = document.getElementById('action-btn');
    const resultMsgEl = document.getElementById('result-msg');
    const gameScreen = document.getElementById('game-screen');
    const endScreen = document.getElementById('end-screen');
    const finalScoreEl = document.getElementById('final-score');

    // Hàm trộn ngẫu nhiên các từ
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        const newArray = [...array];
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [newArray[currentIndex], newArray[randomIndex]] = [newArray[randomIndex], newArray[currentIndex]];
        }
        return newArray;
    }

    function initQuestion() {
        isChecked = false;
        resultMsgEl.textContent = "";
        resultMsgEl.className = "result-message";
        actionBtn.textContent = "Kiểm Tra";
        answerZoneEl.innerHTML = "";
        wordPoolEl.innerHTML = "";

        const currentQ = questions[currentQuestionIndex];
        progressEl.textContent = `Câu hỏi ${currentQuestionIndex + 1} / ${questions.length}`;
        hintEl.textContent = `Gợi ý: ${currentQ.hint}`;

        // Trộn các từ và hiển thị
        const shuffledWords = shuffle(currentQ.words);
        shuffledWords.forEach((word, index) => {
            const wordCard = document.createElement('div');
            wordCard.className = 'word-card';
            wordCard.textContent = word;
            wordCard.dataset.index = index;
            wordCard.onclick = () => handleWordClick(wordCard);
            wordPoolEl.appendChild(wordCard);
        });
    }

    function handleWordClick(card) {
        if (isChecked) return; // Không cho bấm khi đã check đáp án

        if (card.parentElement.id === 'word-pool') {
            answerZoneEl.appendChild(card);
        } else {
            wordPoolEl.appendChild(card);
        }
    }

    function checkAnswer() {
        if (isChecked) {
            // Nếu đã check rồi, bấm nút này sẽ chuyển sang câu tiếp theo
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                initQuestion();
            } else {
                showEndScreen();
            }
            return;
        }

        const userWords = Array.from(answerZoneEl.children).map(card => card.textContent);
        const userSentence = userWords.join(" ");
        const correctSentence = questions[currentQuestionIndex].correct;

        if (userSentence === correctSentence) {

            resultMsg

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Sắp Xếp Câu Tiếng Anh (A2-B1)</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --background-color: #f5f7fa;
            --card-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-container {
            background-color: var(--card-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .progress-bar {
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .hint {
            font-style: italic;
            color: #555;
            margin-bottom: 25px;
            background: #edf2f7;
            padding: 10px;
            border-radius: 8px;
        }

        .word-pool, .answer-zone {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            min-height: 60px;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .word-pool {
            background-color: #e2e8f0;
            border: 2px dashed #cbd5e0;
        }

        .answer-zone {
            background-color: #edf2f7;
            border: 2px solid #cbd5e0;
        }

        .word-card {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 18px;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }

        .word-card:active {
            transform: scale(0.95);
        }

        button {
            background-color: #2d3748;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

            background-color: #4a5568
